name: looper_player
description: "Looper Player - A powerful music player."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 2.0.0+7

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.8
  lucide_icons_flutter: ^3.1.14+1
  glassmorphism: ^3.0.0
  animations: ^2.0.11
  window_manager: ^0.5.1
  google_fonts: ^8.1.0
  squiggly_slider: ^1.0.5
  flutter_lyric: ^3.0.3
  dynamic_color: ^1.7.0
  adaptive_palette: ^3.1.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Audio Playback
  media_kit: ^1.1.10
  media_kit_libs_linux: ^1.1.2
  media_kit_libs_android_audio: ^1.3.8
  media_kit_native_event_loop: ^1.0.9

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # SVG Support
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0

  # Utilities
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  metadata_god: ^0.5.0
  permission_handler: ^12.0.2
  file_picker: ^8.3.7
  http: ^1.2.1
  palette_generator: ^0.3.3+3
  cached_network_image: ^3.3.1
  scrollable_positioned_list: ^0.3.8
  dbus: ^0.7.12
  local_notifier: ^0.1.6
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  just_audio_background: ^0.0.1-beta.17
  share_plus: ^12.0.2
  ffmpeg_kit_flutter_new_full:
  marqueer: ^2.5.0
  wakelock_plus: ^1.2.8
  flutter_hsvcolor_picker: ^1.5.1
  flutter_displaymode: ^0.7.0
  flutter_performance_optimizer: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1
  flutter_distributor: ^0.6.6
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/launcher_logo.png"
  adaptive_icon_background: "#55DF69"
  adaptive_icon_foreground: "assets/launcher_logo_adaptive.png"
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
    - assets/music_bar_Icons/
    - assets/side_bar/
    - assets/about/
    - assets/android_icons/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/Space_Grotesk/static/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/Space_Grotesk/static/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/Space_Grotesk/static/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: DM Sans
      fonts:
        - asset: assets/fonts/DM_Sans/static/DMSans-Regular.ttf
        - asset: assets/fonts/DM_Sans/static/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DM_Sans/static/DMSans-Bold.ttf
          weight: 700
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/Plus_Jakarta_Sans/static/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/Plus_Jakarta_Sans/static/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/Plus_Jakarta_Sans/static/PlusJakartaSans-Bold.ttf
          weight: 700

dependency_overrides:
  uuid: ^4.4.2
