name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libmpv-dev libsecret-1-dev \
            libjsoncpp-dev libsecret-1-dev \
            libgcrypt20-dev \
            dpkg-dev rpm \
            wget libfuse2

      - name: Install AppImageTool
        run: |
          sudo wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter Dependencies
        run: |
          flutter pub get
          flutter pub global activate flutter_distributor

      - name: Build All Formats
        run: |
          # Use flutter_distributor to build all configured formats
          # We use --name dev because that's how it's defined in distribute_options.yaml
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          flutter_distributor release --name dev --target deb
          flutter_distributor release --name dev --target rpm
          flutter_distributor release --name dev --target appimage
          flutter_distributor release --name dev --target archive

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
